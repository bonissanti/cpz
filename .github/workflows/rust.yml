name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Valgrind
        run: sudo apt-get install -y valgrind
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
      - name: Run tests under Valgrind
        run: |
          BINARY=$(cargo test --verbose --no-run 2>&1 | grep -oP '(?<=Executable unittests ).*(?= \()')
          valgrind --error-exitcode=1 --leak-check=full --show-leak-kinds=all $BINARY

